<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} — 9Skies9</title>
    <style>
      :root {
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #6366f1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 35%);
        color: var(--text);
        line-height: 1.7;
      }
      .wrapper {
        width: min(720px, 92vw);
        margin: 0 auto;
        padding: 3rem 1rem 5rem;
      }
      nav {
        margin-bottom: 3rem;
        font-size: 0.9rem;
      }
      nav a {
        color: var(--accent);
        text-decoration: none;
      }
      nav a:hover { text-decoration: underline; }
      header h1 {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        margin: 0 0 0.5rem;
        line-height: 1.2;
      }
      .meta {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 2.5rem;
      }
      .content h2 { font-size: 1.4rem; margin-top: 2.5rem; }
      .content h3 { font-size: 1.15rem; margin-top: 2rem; }
      .content p  { margin: 1rem 0; }
      .content a  { color: var(--accent); }
      .content code {
        font-family: "Menlo", "Courier New", monospace;
        font-size: 0.88em;
        background: #e2e8f0;
        padding: 0.15em 0.4em;
        border-radius: 3px;
      }
      .content pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 1.25rem;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 0.88rem;
      }
      .content pre code {
        background: none;
        padding: 0;
        color: inherit;
      }
      .content blockquote {
        border-left: 3px solid var(--accent);
        margin: 1.5rem 0;
        padding: 0.5rem 0 0.5rem 1.25rem;
        color: var(--muted);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <nav><a href="/">← home</a></nav>
      <header>
        <h1>{{ page.title }}</h1>
        <p class="meta">{{ page.date | date: "%B %-d, %Y" }}</p>
      </header>
      <article class="content">
        {{ content }}
      </article>
    </div>
  </body>
</html>
